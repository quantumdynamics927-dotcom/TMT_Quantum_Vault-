name: CI/CD Pipeline

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black
          pip install -e .[dev]

      - name: Run Ruff linter
        run: ruff check tmt_quantum_vault/ tests/test_regression.py

      - name: Run Black formatter check
        run: black --check tmt_quantum_vault/ tests/test_regression.py

      - name: Run MyPy type checker
        run: mypy tmt_quantum_vault/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -e .[dev]

      - name: Run Bandit security linter
        run: bandit -r tmt_quantum_vault/ -ll --skip B101,B311
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: safety check --full-report || true
        continue-on-error: true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine "packaging>=24.2"

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Check README exists
        run: test -f README.md

      - name: Check CHANGELOG exists
        run: test -f CHANGELOG.md

      - name: Check LICENSE exists
        run: test -f LICENSE

      - name: Check ETHICS policy exists
        run: test -f ETHICS.md

      - name: Check SECURITY policy exists
        run: test -f SECURITY.md

      - name: Validate JSON files
        run: |
          python -c "
          import json
          from pathlib import Path
          json_files = list(Path('.').rglob('*.json'))
          for jf in json_files:
              if '.venv' not in str(jf) and 'node_modules' not in str(jf):
                  try:
                      with open(jf) as f:
                          json.load(f)
                      print(f'✓ {jf}')
                  except json.JSONDecodeError as e:
                      print(f'✗ {jf}: {e}')
          "
