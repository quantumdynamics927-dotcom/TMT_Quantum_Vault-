name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: Run the cloud smoke command matrix on a preconfigured runner
        required: false
        default: false
        type: boolean
      cloud_model:
        description: Cloud model tag to use for the smoke matrix
        required: false
        default: qwen3-coder-next:cloud
        type: string

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run regression suite
        run: python -m pytest tests/test_regression.py -q

  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile project sources
        run: python -m compileall tmt_quantum_vault tests

      - name: Validate repository data
        run: python -m tmt_quantum_vault validate

      - name: Generate repository summary
        run: python -m tmt_quantum_vault summary

  smoke-matrix:
    if: github.event_name == 'workflow_dispatch' && inputs.run_smoke
    runs-on: ubuntu-latest
    needs:
      - pytest
      - diagnostics
    env:
      CLOUD_MODEL: ${{ inputs.cloud_model }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: smoke-cloud
            command: >-
              python -m tmt_quantum_vault smoke-cloud
              --model "${CLOUD_MODEL}" --json --raw-final-only
          - name: agent-task-cloud
            command: >-
              python -m tmt_quantum_vault agent-task
              "Produce a short JSON object with keys workflow, validator, and visual, each containing a one-line status."
              --mode cloud --model "${CLOUD_MODEL}" --json --raw-final-only
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ${{ matrix.name }}
        shell: bash
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          if [ -z "${OLLAMA_API_KEY}" ]; then
            echo "OLLAMA_API_KEY GitHub Actions secret is required for cloud smoke runs."
            exit 1
          fi
          ${{ matrix.command }}

  release-gate-cloud:
    if: github.event_name == 'workflow_dispatch' && inputs.run_smoke
    runs-on: ubuntu-latest
    needs:
      - pytest
      - diagnostics
      - smoke-matrix
    env:
      CLOUD_MODEL: ${{ inputs.cloud_model }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate baseline evidence bundle
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          if [ -z "${OLLAMA_API_KEY}" ]; then
            echo "OLLAMA_API_KEY GitHub Actions secret is required for cloud smoke runs."
            exit 1
          fi
          python -m tmt_quantum_vault release-evidence \
            --output-dir Resonance_Logs/daily/release-evidence-ci-baseline \
            --model "${CLOUD_MODEL}" \
            --json

      - name: Generate candidate evidence bundle with comparison
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          python -m tmt_quantum_vault release-evidence \
            --output-dir Resonance_Logs/daily/release-evidence-ci-candidate \
            --compare-to Resonance_Logs/daily/release-evidence-ci-baseline \
            --model "${CLOUD_MODEL}" \
            --json

      - name: Enforce release gate
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          python -m tmt_quantum_vault release-gate \
            --bundle Resonance_Logs/daily/release-evidence-ci-candidate \
            --require-comparison \
            --json
